app = 'profitable-merchandise-app-marbled-star-2981'
primary_region = 'sin'

[build]

[env]
  PORT = '3000'
  SCOPES = 'read_discounts,write_metaobject_definitions,write_metaobjects,write_products'
  SHOPIFY_API_KEY = 'ade8b574874305b5b41bca4fb3455275'
  SHOPIFY_APP_URL = 'https://profitable-merchandise-app-marbled-star-2981.fly.dev'

[processes]
  app = 'node ./dbsetup.js npm run docker-start'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
